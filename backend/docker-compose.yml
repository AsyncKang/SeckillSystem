# 本地开发依赖：Redis、RocketMQ（MySQL 使用本机安装的）
# 启动：docker-compose up -d
# 然后分别启动各 Spring Boot 服务与前端

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rmqnamesrv:
    image: apache/rocketmq:4.9.6
    container_name: rmqnamesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rmqbroker:
    image: apache/rocketmq:4.9.6
    container_name: rmqbroker
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-4.9.6/conf/broker.conf
    depends_on:
      - rmqnamesrv
    command: sh mqbroker -c /home/rocketmq/rocketmq-4.9.6/conf/broker.conf

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rmq-dashboard
    ports:
      - "8088:8082"
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rmqnamesrv:9876
    depends_on:
      - rmqnamesrv
