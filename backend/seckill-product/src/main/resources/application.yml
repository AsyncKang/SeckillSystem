server:
  port: 8082

spring:
  application:
    name: seckill-product
  datasource:
    url: jdbc:mysql://localhost:3306/seckill_product?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
rocketmq:
  name-server: localhost:9876
  producer:
    group: seckill-product-producer

app:
  jwt:
    secret: seckill-jwt-secret-change-in-production-min-256bits
