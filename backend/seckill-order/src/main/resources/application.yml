server:
  port: 8083

spring:
  application:
    name: seckill-order
  datasource:
    url: jdbc:mysql://localhost:3306/seckill_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  jwt:
    secret: seckill-jwt-secret-change-in-production-min-256bits

rocketmq:
  name-server: localhost:9876
  consumer:
    group: seckill-order-consumer
